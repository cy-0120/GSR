<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>강남 안전핀 - 강남구 위험 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-pin">📍</span>
      <div>
        <h1>강남 안전핀</h1>
        <p>강남구 위험 지도 · 시민 제보 기반 안전 플랫폼</p>
      </div>
    </div>
    <div class="header-actions">
      <button id="openCongestionBtn" class="btn btn-secondary">혼잡도 조사</button>
      <button id="openReportBtn" class="btn btn-primary">문제 제보하기</button>
    </div>
  </header>

  <div class="app-body">
    <aside class="filter-panel" id="filterPanel">
      <div class="filter-panel-header">
        <h2>필터</h2>
        <button id="resetFiltersBtn" class="btn-link">초기화</button>
      </div>
      <div id="filterGroups" class="filter-groups"></div>
      <div class="filter-summary" id="filterSummary"></div>
    </aside>

    <button id="toggleFilterBtn" class="filter-toggle-btn" aria-label="필터 열기/닫기">☰ 필터</button>

    <main class="map-area">
      <div id="map"></div>
      <button id="mobileCongestionToggleBtn" class="mobile-congestion-toggle-btn" aria-label="혼잡도 조사">혼잡도 조사</button>
      <div class="legend">
        <div><span class="dot red"></span>위험 높음</div>
        <div><span class="dot orange"></span>주의 필요</div>
        <div><span class="dot yellow"></span>확인 필요</div>
        <div><span class="dot blue"></span>혼잡 정보</div>
        <div><span class="dot green"></span>해결됨</div>
      </div>
    </main>

    <section class="mobile-report-panel" id="mobileReportPanel">
      <div class="mobile-cta-area">
        <span id="mobileLocationSummary">📍 위치 확인 중...</span>
        <button type="button" class="btn btn-primary mobile-cta-btn" id="mobileOpenReportPageBtn" disabled>🚨 제보하기</button>
      </div>
    </section>

    <section class="mobile-report-page" id="mobileReportFormPage">
      <div class="mobile-report-page-header">
        <button type="button" class="btn-link" id="mobileReportBackBtn">← 뒤로</button>
        <strong>위험 요소 제보하기</strong>
        <span class="mobile-report-page-header-spacer"></span>
      </div>

      <div class="mobile-location-bar">
        <span id="mobileLocationStatus">📍 위치 확인 중...</span>
        <button type="button" class="btn-link" id="mobileLocationRefreshBtn">새로고침</button>
      </div>

      <form id="mobileReportForm" class="mobile-report-form">
        <div class="chip-group" id="mobileProblemTypes"></div>
        <input type="text" id="mobileProblemTypeOther" class="other-input hidden" placeholder="기타 문제 유형을 직접 입력해 주세요" />

        <textarea name="detail" id="mobileDetail" rows="3" placeholder="무슨 문제인가요? 예) 보도블록이 깨져 있고 가로등도 어두워서 위험해요"></textarea>

        <div class="mobile-photo-row">
          <label class="mobile-photo-btn" for="mobilePhoto">
            <span id="mobilePhotoLabel">📷 사진 촬영</span>
          </label>
          <input type="file" name="photo" id="mobilePhoto" accept="image/*" capture="environment" class="hidden" />
          <img id="mobilePhotoPreview" class="mobile-photo-preview hidden" alt="첨부 사진 미리보기" />
        </div>

        <details class="mobile-optional-fields">
          <summary>상세 옵션 (선택)</summary>

          <label class="field">
            <span>지역 (동)</span>
            <input type="text" id="mobileDong" list="mobileDongList" placeholder="위치 확인 시 자동으로 채워집니다" autocomplete="off" />
            <datalist id="mobileDongList"></datalist>
          </label>

          <div class="field-row">
            <label class="field">
              <span>발생 시간대</span>
              <select id="mobileTimeBand"></select>
            </label>
            <label class="field">
              <span>보행자 유형</span>
              <select id="mobilePedestrianType"></select>
            </label>
          </div>

          <label class="field">
            <span>혼잡 여부 <button type="button" class="btn-link" id="mobileCongestionResetBtn">선택 안 함</button></span>
            <div class="gradient-bar" id="mobileCongestionBar"></div>
            <div class="gradient-bar-caption" id="mobileCongestionCaption">해당 없음</div>
          </label>
        </details>

        <p class="error-text" id="mobileFormError"></p>
        <button type="submit" class="btn btn-primary mobile-submit-btn" id="mobileSubmitBtn" disabled>위치 확인 중...</button>
      </form>
    </section>

    <section class="detail-panel" id="detailPanel">
      <button class="detail-close" id="detailCloseBtn">&times;</button>
      <div id="detailContent"></div>
    </section>
  </div>

  <!-- 문제 제보 모달 -->
  <div class="modal-backdrop" id="reportModalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <h2>지도 기반 문제 제보</h2>
        <button class="modal-close" id="reportModalCloseBtn">&times;</button>
      </div>
      <form id="reportForm" class="modal-body">
        <p class="hint" id="reportLocationHint">지도를 클릭해 위치를 선택해 주세요.
          <button type="button" class="btn-link" id="reportChangeLocationBtn">위치 다시 선택</button>
        </p>

        <label class="field">
          <span>지역 (동)</span>
          <input type="text" name="dong" id="reportDong" list="reportDongList" placeholder="동 이름을 검색하세요 (예: 대치동)" autocomplete="off" required />
          <datalist id="reportDongList"></datalist>
        </label>

        <label class="field">
          <span>문제 유형 (복수 선택 가능)</span>
          <div class="chip-group" id="reportProblemTypes"></div>
          <input type="text" id="reportProblemTypeOther" class="other-input hidden" placeholder="기타 문제 유형을 직접 입력해 주세요" />
        </label>

        <label class="field">
          <span>상세 내용</span>
          <textarea name="detail" id="reportDetail" rows="4" placeholder="예) 학원 끝나고 밤에 여기 지나가는데 보도블록이 깨져 있고 가로등도 어두워서 위험해요."></textarea>
        </label>

        <label class="field">
          <span>사진 첨부 (선택)</span>
          <input type="file" name="photo" id="reportPhoto" accept="image/*" />
        </label>

        <div class="field-row">
          <label class="field">
            <span>발생 시간대 (선택)</span>
            <select name="timeBand" id="reportTimeBand"></select>
          </label>
          <label class="field">
            <span>보행자 유형 (선택)</span>
            <select name="pedestrianType" id="reportPedestrianType"></select>
          </label>
        </div>

        <label class="field">
          <span>혼잡 여부 (선택) <button type="button" class="btn-link" id="reportCongestionResetBtn">선택 안 함</button></span>
          <div class="gradient-bar" id="reportCongestionBar"></div>
          <div class="gradient-bar-caption" id="reportCongestionCaption">해당 없음</div>
        </label>

        <div class="ai-preview-box">
          <div class="ai-preview-header">
            <strong>AI 분석 미리보기</strong>
            <button type="button" id="aiPreviewBtn" class="btn btn-ghost">AI로 분석하기</button>
          </div>
          <p class="hint hint-inline">위험도는 사용자가 정하지 않습니다. AI가 제보 내용을 분석해 자동으로 위험도를 배정합니다.</p>
          <div id="aiPreviewResult" class="ai-preview-result">상세 내용을 입력하고 "AI로 분석하기"를 눌러보세요.</div>
        </div>

        <p class="error-text" id="reportFormError"></p>

        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="reportCancelBtn">취소</button>
          <button type="submit" class="btn btn-primary" id="reportSubmitBtn">제보 접수하기</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 혼잡도 조사 모달 -->
  <div class="modal-backdrop" id="congestionModalBackdrop">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>혼잡도 조사</h2>
        <button class="modal-close" id="congestionModalCloseBtn">&times;</button>
      </div>
      <form id="congestionForm" class="modal-body">
        <p class="hint" id="congestionLocationHint">지도를 클릭해 위치를 선택해 주세요.
          <button type="button" class="btn-link" id="congestionChangeLocationBtn">위치 다시 선택</button>
        </p>

        <label class="field">
          <span>지역 (동)</span>
          <input type="text" name="dong" id="congestionDong" list="congestionDongList" placeholder="동 이름을 검색하세요 (예: 대치동)" autocomplete="off" required />
          <datalist id="congestionDongList"></datalist>
        </label>

        <label class="field">
          <span>혼잡 시간</span>
          <select name="congestionTimeBand" id="congestionTimeBand" required></select>
        </label>

        <label class="field">
          <span>혼잡도</span>
          <div class="gradient-bar" id="congestionLevelBar"></div>
          <div class="gradient-bar-caption" id="congestionLevelCaption">혼잡도를 선택하세요</div>
        </label>

        <p class="error-text" id="congestionFormError"></p>

        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="congestionCancelBtn">취소</button>
          <button type="submit" class="btn btn-primary">혼잡도 제보하기</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
